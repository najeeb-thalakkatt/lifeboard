name: lifeboard
description: "Plan life together, simply."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  firebase_analytics: ^12.1.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^17.1.0

  # UI
  google_fonts: ^8.0.2
  lottie: ^3.3.2

  # File & Image Picking
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.5.3
  intl: ^0.20.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.5.4
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
